<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb3ff"/>
      <stop offset="50%" style="stop-color:#007acc"/>
      <stop offset="100%" style="stop-color:#005a9e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="#1e1e1e"/>

  <!-- Keyboard key shape -->
  <rect x="24" y="30" width="80" height="68" rx="12" fill="url(#mainGrad)"/>

  <!-- Key highlight -->
  <rect x="28" y="34" width="72" height="28" rx="8" fill="#7cc6ff" opacity="0.3"/>

  <!-- Which key indicator: W + ? -->
  <text x="64" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">W</text>
  <circle cx="94" cy="44" r="12" fill="#ff6b6b"/>
  <text x="94" y="49" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">?</text>
</svg>