<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc1ff"/>
      <stop offset="100%" style="stop-color:#007acc"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89ddff"/>
      <stop offset="100%" style="stop-color:#4fc1ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="#1e1e1e"/>

  <!-- Main key shape -->
  <rect x="24" y="20" width="80" height="56" rx="8" fill="url(#keyGradient)"/>

  <!-- Secondary/layered key -->
  <rect x="36" y="32" width="80" height="56" rx="8" fill="url(#accentGradient)" opacity="0.9"/>

  <!-- Tertiary key -->
  <rect x="48" y="44" width="80" height="56" rx="8" fill="#89ddff" opacity="0.85"/>

  <!-- Question mark as paths (no font needed) -->
  <g transform="translate(88, 78)" fill="#1e1e1e">
    <!-- Question mark body -->
    <path d="M-6 -14 C-6 -18 -2 -20 0 -20 C4 -20 6 -16 6 -12 C6 -8 2 -6 0 -4 L-2 -2 L-2 0 L2 0 L2 -2 C6 -4 10 -8 10 -12 C10 -18 4 -24 0 -24 C-6 -24 -10 -18 -10 -14 Z"/>
    <!-- Question mark dot -->
    <circle cx="0" cy="8" r="3"/>
  </g>

  <!-- Small key indicators at bottom -->
  <rect x="32" y="92" width="20" height="20" rx="4" fill="#4fc1ff" opacity="0.6"/>
  <rect x="56" y="92" width="20" height="20" rx="4" fill="#4fc1ff" opacity="0.8"/>
  <rect x="80" y="92" width="20" height="20" rx="4" fill="#4fc1ff"/>
</svg>